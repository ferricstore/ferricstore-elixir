name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      ferricstore:
        image: ghcr.io/ferricstore/ferricstore:0.7.5
        env:
          FERRICSTORE_PROTECTED_MODE: "false"
          FERRICSTORE_NATIVE_ENABLED: "true"
          FERRICSTORE_NATIVE_BIND: "0.0.0.0"
          FERRICSTORE_NATIVE_PORT: "6388"
          FERRICSTORE_NATIVE_ADVERTISE_HOST: "127.0.0.1"
          FERRICSTORE_NATIVE_ADVERTISE_PORT: "6388"
        ports:
          - 6388:6388
    steps:
      - uses: actions/checkout@v5
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"
      - run: mix deps.get
      - run: mix format --check-formatted
      - run: mix compile --warnings-as-errors
      - run: mix credo --strict
      - run: mix test --exclude integration
      - run: mix hex.build
      - run: |
          for i in {1..60}; do
            mix run -e 'client = FerricStore.connect!(url: "ferric://127.0.0.1:6388"); FerricStore.ping(client); FerricStore.close(client)' && exit 0
            sleep 1
          done
          exit 1
      - run: mix test --only integration

  publish:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check Hex credentials
        id: hex_creds
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: |
          if [ -n "$HEX_API_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "HEX_API_KEY is not configured; skipping Hex publish."
          fi
      - uses: erlef/setup-beam@v1
        if: steps.hex_creds.outputs.available == 'true'
        with:
          otp-version: "28"
          elixir-version: "1.19"
      - run: mix deps.get
        if: steps.hex_creds.outputs.available == 'true'
      - run: mix hex.publish --yes
        if: steps.hex_creds.outputs.available == 'true'
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
