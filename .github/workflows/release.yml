name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/checkout@v5
        with:
          repository: ferricstore/ferricstore
          ref: 72452814231f592aff051c22fdbe7114476e2879
          path: ferricstore-server
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          elixir-version: "1.20"
      - run: mix deps.get
      - run: mix format --check-formatted
      - run: mix compile --warnings-as-errors
      - run: mix credo --strict
      - run: mix test --cover --exclude integration
      - name: Offline hot-path benchmark smoke test
        run: >-
          mix run bench/sdk_hot_path_benchmark.exs
          --iterations 1 --frames 1000 --body-bytes 32
          --packet-bytes 17 --keys 1000
          --max-append-ms 10.0 --max-append-reductions 50000
          --max-decode-ms 10.0 --max-decode-reductions 100000
          --max-encode-ms 10.0 --max-encode-reductions 100000
          --max-mget-ms 20.0 --max-mget-reductions 70000
          --max-mset-ms 20.0 --max-mset-reductions 250000
      - run: mix hex.build
      - name: Build the pinned compatible FerricStore server
        run: >-
          FERRICSTORE_SERVER_SOURCE=ferricstore-server
          FERRICSTORE_TEST_IMAGE=ferricstore-sdk-contract
          scripts/build_integration_server.sh
      - name: Start FerricStore
        run: >-
          docker run --detach --rm --name ferricstore-sdk-contract
          --env FERRICSTORE_PROTECTED_MODE=false
          --env FERRICSTORE_NATIVE_ENABLED=true
          --env FERRICSTORE_NATIVE_BIND=0.0.0.0
          --env FERRICSTORE_NATIVE_PORT=6388
          --env FERRICSTORE_NATIVE_ADVERTISE_HOST=127.0.0.1
          --env FERRICSTORE_NATIVE_ADVERTISE_PORT=6388
          --publish 6388:6388 ferricstore-sdk-contract
      - run: |
          for i in {1..60}; do
            mix run -e 'client = FerricStore.connect!(url: "ferric://127.0.0.1:6388"); FerricStore.ping(client); FerricStore.close(client)' && exit 0
            sleep 1
          done
          exit 1
      - run: mix test --only integration
      - name: Stop FerricStore
        if: always()
        run: docker stop ferricstore-sdk-contract || true

  publish:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check Hex credentials
        id: hex_creds
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: |
          if [ -n "$HEX_API_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "HEX_API_KEY is not configured; skipping Hex publish."
          fi
      - uses: erlef/setup-beam@v1
        if: steps.hex_creds.outputs.available == 'true'
        with:
          otp-version: "29"
          elixir-version: "1.20"
      - run: mix deps.get
        if: steps.hex_creds.outputs.available == 'true'
      - run: mix hex.publish --yes
        if: steps.hex_creds.outputs.available == 'true'
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
