name: CI

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"
      - run: mix deps.get
      - run: mix format --check-formatted
      - run: mix compile --warnings-as-errors
      - run: mix credo --strict
      - run: mix test --exclude integration
      - run: mix hex.build

  integration:
    runs-on: ubuntu-latest
    services:
      ferricstore:
        image: ghcr.io/ferricstore/ferricstore:0.5.2
        env:
          FERRICSTORE_PROTECTED_MODE: "false"
        ports:
          - 6388:6388
    steps:
      - uses: actions/checkout@v5
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"
      - run: mix deps.get
      - run: |
          for i in {1..60}; do
            mix run -e 'client = FerricStore.connect!(url: "ferric://127.0.0.1:6388"); FerricStore.ping(client); FerricStore.close(client)' && exit 0
            sleep 1
          done
          exit 1
      - run: mix test --only integration
